<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Figus é o melhor app para controlar sua coleção de figurinhas — Copa do Mundo 2026 e mais.">

  <!-- Open Graph tags so WhatsApp/Telegram/Facebook show a rich preview
       (logo + título + descrição) instead of just the raw URL when the
       user shares "comparar trocas" via chat. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Figus">
  <meta property="og:title" content="Figus — controle sua coleção de figurinhas">
  <meta property="og:description" content="Marque o que tem, descubra as melhores trocas e complete o álbum da Copa 2026.">
  <meta property="og:image" content="https://sampaiodaniel.github.io/figus/figus-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:url" content="https://sampaiodaniel.github.io/figus/">
  <meta property="og:locale" content="pt_BR">

  <!-- Twitter Card mirrors Open Graph for the Twitter/X preview. -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Figus — controle sua coleção de figurinhas">
  <meta name="twitter:description" content="Marque o que tem, descubra as melhores trocas e complete o álbum da Copa 2026.">
  <meta name="twitter:image" content="https://sampaiodaniel.github.io/figus/figus-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Figus">
  <link rel="apple-touch-icon" href="figus-192.png">

  <!-- Favicon (tight-cropped Figus logo at multiple sizes) -->
  <link rel="icon" type="image/png" sizes="32x32"  href="figus-32.png"/>
  <link rel="icon" type="image/png" sizes="64x64"  href="figus-64.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="figus-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="figus-512.png"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Figus — controle sua coleção de figurinhas</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
